<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEAN SYNC | 統合デバッグ</title>
    <style>
        :root {
            --bg: #0d1117; --primary: #58a6ff; --accent: #ff66b2;
            --success: #238636; --warning: #d29922; --danger: #da3633;
        }
        body { background: var(--bg); color: var(--primary); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        
        /* ステータス */
        .status-card { border: 2px solid var(--primary); padding: 15px; margin-bottom: 20px; border-radius: 12px; background: rgba(22, 27, 34, 0.9); }
        .rank-badge { font-size: 2rem; font-weight: 900; color: var(--accent); }
        .gauge-container { width: 100%; height: 10px; background: #30363d; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .gauge-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s; }

        /* ミッション切り替え */
        h2 { font-size: 0.9rem; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 5px; margin-top: 25px; }
        
        .quest-item { background: #161b22; border: 1px solid #30363d; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .quest-header { display: flex; justify-content: space-between; align-items: center; }
        .quest-title { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .reward { font-size: 0.75rem; color: var(--accent); }
        
        .debug-btn { background: var(--success); color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 0.85rem; }
        .debug-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        .cooldown { font-size: 0.7rem; color: var(--warning); display: block; text-align: center; margin-top: 4px; }
        
        .monthly { border-left: 4px solid var(--warning); }
        .daily { border-left: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center;">
        <h1 style="color: var(--accent); margin-bottom: 5px;">CLEAN SYNC</h1>
        <div id="streak-info" style="font-size: 0.8rem;">🔥 CONTINUOUS: <span id="streak-days">0</span> DAYS</div>
    </header>

    <div class="status-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="rank-name" class="rank-badge">RANK E</span>
            <div style="text-align: right;">
                <div style="font-size: 0.75rem;">MOTE_LEVEL</div>
                <div id="score-val" style="font-size: 1.2rem; font-weight: bold;">0%</div>
            </div>
        </div>
        <div class="gauge-container"><div id="mote-bar" class="gauge-fill"></div></div>
    </div>

    <!-- DAILY -->
    <h2>⚡ DAILY MISSIONS (ついで掃除)</h2>
    <div id="daily-list">
        <div class="quest-item daily">
            <div class="quest-header"><span class="quest-title">🛁 ラスト・シャワー</span><span class="reward">+5 EXP</span></div>
            <p style="font-size: 0.7rem; margin: 5px 0;">冷水で浴室の温度を下げ、カビのスポーンを抑制せよ。</p>
            <button class="debug-btn" id="btn-daily-bath" onclick="doQuest('daily-bath', 5, 24)">デバッグ実行</button>
            <span id="time-daily-bath" class="cooldown"></span>
        </div>
        <div class="quest-item daily">
            <div class="quest-header"><span class="quest-title">🚽 着座ついで拭き</span><span class="reward">+5 EXP</span></div>
            <p style="font-size: 0.7rem; margin: 5px 0;">シート1枚でフチを1周。汚れの固着バグを防ぐ。</p>
            <button class="debug-btn" id="btn-daily-toilet" onclick="doQuest('daily-toilet', 5, 24)">デバッグ実行</button>
            <span id="time-daily-toilet" class="cooldown"></span>
        </div>
    </div>

    <!-- MONTHLY -->
    <h2>🏆 MONTHLY BOSS (しっかりデバッグ)</h2>
    <div id="monthly-list">
        <div class="quest-item monthly">
            <div class="quest-header"><span class="quest-title">🔥 60度バースト：排水口</span><span class="reward">+30 EXP</span></div>
            <p style="font-size: 0.7rem; margin: 5px 0;">筒を外しヘドロを抹消。チョウバエ母体を完全沈黙。</p>
            <button class="debug-btn" id="btn-mon-drain" onclick="doQuest('mon-drain', 30, 672)">ボス討伐 (月1)</button>
            <span id="time-mon-drain" class="cooldown"></span>
        </div>
        <div class="quest-item monthly">
            <div class="quest-header"><span class="quest-title">🖼️ 窓際：黒カミスライム浄化</span><span class="reward">+20 EXP</span></div>
            <p style="font-size: 0.7rem; margin: 5px 0;">サッシの溝を徹底洗浄。視界の解像度を上げよ。</p>
            <button class="debug-btn" id="btn-mon-window" onclick="doQuest('mon-window', 20, 672)">ボス討伐 (月1)</button>
            <span id="time-mon-window" class="cooldown"></span>
        </div>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('cs_v4')) || { score: 0, streak: 0, lastDate: null, cooldowns: {} };

    function doQuest(id, points, hours) {
        const now = Date.now();
        state.score = Math.min(100, state.score + points);
        state.cooldowns[id] = now + (hours * 60 * 60 * 1000);
        
        const today = new Date().toDateString();
        if(state.lastDate !== today) { state.streak++; state.lastDate = today; }
        
        localStorage.setItem('cs_v4', JSON.stringify(state));
        render();
        alert(`Mission Complete! \nモテ度が ${points} 上がった！`);
    }

    function render() {
        const now = Date.now();
        document.getElementById('mote-bar').style.width = state.score + '%';
        document.getElementById('score-val').innerText = state.score + '%';
        document.getElementById('streak-days').innerText = state.streak;

        // Rank
        const r = document.getElementById('rank-name');
        if(state.score < 30) r.innerText = "RANK E";
        else if(state.score < 70) r.innerText = "RANK B";
        else r.innerText = "RANK S";

        // Buttons
        Object.keys(state.cooldowns).forEach(id => {
            const btn = document.getElementById('btn-' + id);
            const timeSpan = document.getElementById('time-' + id);
            if(!btn) return;
            const diff = state.cooldowns[id] - now;
            if(diff > 0) {
                btn.disabled = true;
                const h = Math.ceil(diff / (1000 * 60 * 60));
                timeSpan.innerText = `READY IN: ${h}h`;
            } else {
                btn.disabled = false;
                timeSpan.innerText = "READY";
            }
        });
    }
    render();
    setInterval(render, 1000 * 60);
</script>
</body>
</html>
