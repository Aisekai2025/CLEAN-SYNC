<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEAN SYNC | 継続デバッグ</title>
    <style>
        :root {
            --bg: #0d1117; --primary: #58a6ff; --accent: #ff66b2;
            --success: #238636; --warning: #d29922; --danger: #da3633;
        }
        body { background: var(--bg); color: var(--primary); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        
        /* ステータスセクション */
        .status-card { border: 2px solid var(--primary); padding: 20px; margin-bottom: 20px; border-radius: 12px; background: rgba(22, 27, 34, 0.9); box-shadow: 0 0 20px rgba(88,166,255,0.2); }
        .mote-header { display: flex; justify-content: space-between; align-items: baseline; }
        .rank-badge { font-size: 2rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .streak-counter { font-size: 0.9rem; color: #fff; background: var(--danger); padding: 2px 10px; border-radius: 20px; }
        
        .gauge-container { width: 100%; height: 12px; background: #30363d; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .gauge-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 1s ease-out; }

        /* クエストセクション */
        .quest-item { background: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 12px; border-radius: 10px; position: relative; overflow: hidden; }
        .quest-title { font-weight: bold; color: #fff; display: block; }
        .quest-desc { font-size: 0.75rem; color: #8b949e; margin: 4px 0; }
        
        .debug-btn { background: var(--success); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 8px; }
        .debug-btn:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        
        .cooldown-text { font-size: 0.7rem; color: var(--warning); text-align: center; display: block; margin-top: 5px; }

        /* アニメーション */
        .glitch { animation: glitch-anim 0.3s linear; }
        @keyframes glitch-anim { 0% { opacity: 0.5; transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--accent); margin: 0;">CLEAN SYNC</h1>
        <div id="last-sync" style="font-size: 0.7rem; color: #8b949e;">LAST SYNC: ---</div>
    </header>

    <div class="status-card" id="status-display">
        <div class="mote-header">
            <span id="rank-name" class="rank-badge">RANK E</span>
            <span class="streak-counter">🔥 <span id="streak-days">0</span> DAYS STREAK</span>
        </div>
        <div class="gauge-container"><div id="mote-bar" class="gauge-fill"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span>CLEAN_LEVEL: <span id="mote-val">0</span>%</span>
            <span id="mote-status">UNSTABLE</span>
        </div>
    </div>

    <div id="quest-list">
        <!-- JSで動的に生成、または静的に配置 -->
        <div class="quest-item">
            <span class="quest-title">💧 排水口：ヌメリ・デーモン</span>
            <span class="quest-desc">24時間周期のデイリーミッション。物理洗浄で完了。</span>
            <button class="debug-btn" id="btn-drain" onclick="completeQuest('drain', 25)">デバッグ実行 (+25)</button>
            <span id="time-drain" class="cooldown-text"></span>
        </div>

        <div class="quest-item">
            <span class="quest-title">🚽 トイレ：聖域化プロトコル</span>
            <span class="quest-desc">便器のフチ裏をデバッグせよ。</span>
            <button class="debug-btn" id="btn-toilet" onclick="completeQuest('toilet', 15)">デバッグ実行 (+15)</button>
            <span id="time-toilet" class="cooldown-text"></span>
        </div>

        <div class="quest-item">
            <span class="quest-title">📦 玄関：バッファ・オーバーフロー</span>
            <span class="quest-desc">不要な段ボールと靴の整理。</span>
            <button class="debug-btn" id="btn-entrance" onclick="completeQuest('entrance', 10)">デバッグ実行 (+10)</button>
            <span id="time-entrance" class="cooldown-text"></span>
        </div>
    </div>
</div>

<script>
    // データ初期化
    let state = JSON.parse(localStorage.getItem('cleanSyncState')) || {
        score: 0,
        streak: 0,
        lastDate: null,
        coolDowns: {}
    };

    function save() { localStorage.setItem('cleanSyncState', JSON.stringify(state)); }

    function update() {
        const now = new Date();
        const today = now.toDateString();

        // 1. 放置による減衰計算 (12時間で1%減少)
        if (state.lastDate) {
            const last = new Date(state.lastDate);
            const diffHours = (now - last) / (1000 * 60 * 60);
            if (diffHours > 12) {
                state.score = Math.max(0, state.score - Math.floor(diffHours / 12));
            }
            
            // 2. 継続日数の判定 (48時間以上空いたらリセット)
            if (diffHours > 48) state.streak = 0;
        }

        render();
    }

    function completeQuest(id, points) {
        const now = Date.now();
        const cooldownMs = 24 * 60 * 60 * 1000; // 24時間

        if (state.coolDowns[id] && (now - state.coolDowns[id] < cooldownMs)) return;

        // スコア加算
        state.score = Math.min(100, state.score + points);
        
        // 継続日数の更新
        const today = new Date().toDateString();
        if (state.lastDate !== today) {
            state.streak++;
            state.lastDate = today;
        }

        state.coolDowns[id] = now;
        
        document.getElementById('status-display').classList.add('glitch');
        setTimeout(() => document.getElementById('status-display').classList.remove('glitch'), 300);
        
        save();
        render();
    }

    function render() {
        const now = Date.now();
        document.getElementById('mote-bar').style.width = state.score + '%';
        document.getElementById('mote-val').innerText = state.score;
        document.getElementById('streak-days').innerText = state.streak;
        document.getElementById('last-sync').innerText = "LAST_UPDATE: " + (state.lastDate || "NONE");

        // ランク表示
        const rank = document.getElementById('rank-name');
        const status = document.getElementById('mote-status');
        if(state.score < 20) { rank.innerText = "RANK E"; status.innerText = "DIRTY SE"; }
        else if(state.score < 50) { rank.innerText = "RANK C"; status.innerText = "NORMAL"; }
        else if(state.score < 80) { rank.innerText = "RANK A"; status.innerText = "CLEANER"; }
        else { rank.innerText = "RANK S"; status.innerText = "HYPER MODS"; }

        // ボタンのクールダウン表示
        ['drain', 'toilet', 'entrance'].forEach(id => {
            const btn = document.getElementById('btn-' + id);
            const timeSpan = document.getElementById('time-' + id);
            const last = state.coolDowns[id];
            
            if (last && (now - last < 24 * 60 * 60 * 1000)) {
                btn.disabled = true;
                const remain = 24 - Math.floor((now - last) / (1000 * 60 * 60));
                timeSpan.innerText = `NEXT DEBUG: ${remain}h`;
            } else {
                btn.disabled = false;
                timeSpan.innerText = "READY TO DEBUG";
            }
        });
    }

    setInterval(update, 1000 * 60); // 1分ごとに自動更新
    update();
</script>
</body>
</html>
